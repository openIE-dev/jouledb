[package]
name = "joule-metal-rt"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Metal GPU runtime for Joule programming language"
keywords = ["joule", "metal", "gpu", "apple", "runtime"]
categories = ["graphics", "hardware-support"]

[lib]
crate-type = ["rlib"]

[dependencies]
joule-common = { path = "../../../joule-compiler/joule-common" }
thiserror.workspace = true

[target.'cfg(target_os = "macos")'.dependencies]
metal = "0.33"

[dev-dependencies]

[features]
default = []
# Enable actual Metal SDK bindings (requires macOS SDK)
metal-sdk = []

[lints]
workspace = true
